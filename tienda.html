<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda VIP</title>
    <style>
        body {
            background-color: #0b0b0e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }
        h1 { text-align: center; color: #00f2ff; text-transform: uppercase; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background: rgba(20, 20, 27, 0.65);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .price { color: #00ff66; font-size: 1.5rem; font-weight: bold; margin: 15px 0; }
        .btn-buy {
            background: #0077ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-back { display: block; text-align: center; margin-top: 40px; color: #00f2ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Beneficios y Rangos VIP</h1>
    <div class="grid">
        <div class="card">
            <h3>Rango Plata</h3>
            <p class="price">$5.00 / mes</p>
            <p>Prioridad en cola baja, acceso a 2 autos personalizados.</p>
            <button class="btn-buy">Comprar</button>
        </div>
        <div class="card">
            <h3>Rango Oro</h3>
            <p class="price">$10.00 / mes</p>
            <p>Prioridad en cola media, acceso a 5 autos y casa propia.</p>
            <button class="btn-buy">Comprar</button>
        </div>
    </div>
    <a href="index.html" class="btn-back">← Volver al Inicio</a>
</body>
</html>
