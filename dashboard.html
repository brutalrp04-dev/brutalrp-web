<script>
    async function obtenerDatos() {
        const res = await fetch('/api/user');
        const data = await res.json();
        
        if (data.loggedIn) {
            const user = data.user;
            const avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

            // Nombres
            document.getElementById('user-name-side').innerText = user.username;
            document.getElementById('user-welcome-title').innerText = 'Bienvenido, ' + user.username;
            document.getElementById('user-sub-tag').innerText = '@' + user.username;

            // Avatares
            const avatarSide = document.getElementById('user-avatar-side');
            const avatarMain = document.getElementById('user-avatar-main');
            
            avatarSide.style.backgroundImage = 'url("' + avatarUrl + '")';
            avatarSide.style.backgroundSize = 'cover';
            avatarMain.style.backgroundImage = 'url("' + avatarUrl + '")';
            avatarMain.style.backgroundSize = 'cover';
        } else {
            window.location.href = '/';
        }
    }
    window.onload = obtenerDatos;
</script>
