<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL RP - Panel</title>
    <!-- Iconos de Google Fonts para las etiquetas informativas de la izquierda -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* PALETA DE COLORES: ROJO Y NEGRO */
        :root {
            --fondo-oscuro: #000000;        
            --tarjeta-bg: rgba(10, 10, 10, 0.75); 
            --color-principal: #ff0000;     
            --color-secundario: #000000;    
            --texto-blanco: #ffffff;
            --texto-mutado: #aaaaaa;       
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #2a0808 0%, #0a0505 60%, #000000 100%);
            color: var(--texto-blanco);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* CONTENEDOR PRINCIPAL SIN ESTADÍSTICAS */
        .container-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            z-index: 2;
        }

        .landing-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 50px;
        }

        /* --- COLUMNA IZQUIERDA (INFO DE TU WEB) --- */
        .left-side {
            max-width: 550px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-img { 
            width: 100%;
            max-width: 320px; 
            height: auto; 
            filter: drop-shadow(0px 4px 20px rgba(255, 0, 0, 0.4));
        }

        h1.welcome-title {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        h1.welcome-title span {
            color: var(--color-principal);
            text-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        .brand-subtitle { 
            font-size: 16px; 
            color: #cccccc; 
            margin-bottom: 35px; 
        }
        
        /* Cuadrícula de características */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #e0e0e0;
        }

        .feature-item .material-symbols-outlined {
            color: var(--color-principal);
            font-size: 18px;
        }

        /* --- COLUMNA DERECHA (TARJETA DE LOGIN) --- */
        .login-card {
            background: var(--tarjeta-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 0, 0.15); 
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-card .login-desc {
            font-size: 13px;
            color: var(--texto-mutado);
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #888888; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input {
            width: 100%; padding: 14px 16px; background: #050505; border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 8px; color: #fff; font-size: 1rem; transition: all 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: var(--color-principal); box-shadow: 0 0 10px rgba(255, 0, 0, 0.4); }
        
        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(90deg, var(--color-principal), #550000);
            border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4); }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #555555; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.08); }
        .divider span { padding: 0 10px; }

        .btn-discord {
            width: 100%; padding: 14px; background: linear-gradient(90deg, var(--color-principal), var(--color-secundario));
            border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; gap: 10px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }
        .btn-discord:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 0, 0, 0.5); background: linear-gradient(90deg, #ff3333, #cc0000); }

        /* --- IMAGEN FLOTANTE DEL PERSONAJE --- */
        .character-bg {
            position: absolute;
            bottom: 0;
            left: 35%;
            height: 75vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
        }

        .copyright {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 12px;
            color: #444444;
            z-index: 2;
        }

        /* Ajustes Responsivos */
        @media (max-width: 900px) {
            body { align-items: flex-start; }
            .container-wrapper { padding: 20px; }
            .landing-grid { flex-direction: column; justify-content: center; gap: 40px; }
            .left-side { text-align: center; }
            .logo-section { justify-content: center; }
            .features-grid { justify-content: center; }
            .character-bg { display: none; }
            .copyright { position: relative; bottom: 0; right: 0; text-align: center; margin-top: 35px; }
        }
    </style>
</head>
<body>

    <div class="container-wrapper">

        <div class="landing-grid">
            
            <!-- PARTE IZQUIERDA -->
            <div class="left-side">
                <div class="logo-section">
                    <img src="./logo.png" alt="Brutal Roleplay" class="logo-img">
                </div>
                
                <h1 class="welcome-title">Bienvenido a<br><span>Brutal RP</span></h1>
                <p class="brand-subtitle">La comunidad de roleplay más inmersiva de habla hispana.</p>
                
                <div class="features-grid">
                    <div class="feature-item">
                        <span class="material-symbols-outlined">groups</span> Comunidad activa
                    </div>
                    <div class="feature-item">
                        <span class="material-symbols-outlined">verified_user</span> Sistema de whitelist
                    </div>
                    <div class="feature-item">
                        <span class="material-symbols-outlined">stars</span> Roleplay de calidad
                    </div>
                    <div class="feature-item">
                        <span class="material-symbols-outlined">local_police</span> Eventos exclusivos
                    </div>
                </div>
            </div>

            <!-- PARTE DERECHA -->
            <div class="login-card">
                <h2>Iniciar Sesión</h2>
                <p class="login-desc" style="font-size: 13px; color: #888888; margin-bottom: 20px;">Accede al panel oficial</p>

                <form onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>Nombre de Usuario</label>
                        <input type="text" placeholder="Tu nombre en el juego" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Iniciar Sesión</button>
                </form>

                <div class="divider"><span>O</span></div>

                <button class="btn-discord" onclick="window.location.href='https://discord.com/oauth2/authorize?client_id=1522137380981833738&response_type=code&redirect_uri=https%3A%2F%2Fbrutalrp.onrender.com%2Fcallback&scope=identify+guilds'">
                    Autenticar con Discord
                </button>
            </div>

        </div>

    </div>

    <!-- IMAGEN DEL PERSONAJE CENTRAL -->
    <img src="personaje.png" alt="Personaje" class="character-bg">

    <div class="copyright">
        &copy; 2026 Brutal RP. Todos los derechos reservados.
    </div>

</body>
</html>
